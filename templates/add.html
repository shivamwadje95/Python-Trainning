{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-person-plus"></i> Add New Visitor</h2>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Visitor Name</label>
                        <input type="text" class="form-control" name="visitor_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Student to Visit</label>
                        <input type="text" class="form-control" name="student_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Room Number</label>
                        <input type="text" class="form-control" name="room_number" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Purpose</label>
                        <input type="text" class="form-control" name="purpose" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100"><i class="bi bi-check-square"></i> Submit Entry</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-header py-3" style="background-color: #4e73df;">
                <h5 class="mb-0 text-white">
                    <i class="fa fa-edit"></i> Edit Visitor
                </h5>
            </div>

            <div class="card-body p-4">
                <!-- Current values info -->
                <div class="alert alert-info py-2 mb-4">
                    <small>
                        <strong>Editing: </strong>
                        {{ visitor.visiting }} - Room {{ visitor.room }}
                    </small>
                </div>

                <form method="POST" action="{{ url_for('edit_visitor', id=visitor.id) }}">
                    
                    <div class="mb-3">
                        <label class="form-label">Visiting</label>
                        <input type="text" class="form-control" name="visiting" 
                               value="{{ visitor.visiting }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Room</label>
                        <input type="text" class="form-control" name="room" 
                               value="{{ visitor.room }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Purpose</label>
                        <input type="text" class="form-control" name="purpose" 
                               value="{{ visitor.purpose }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">In Time</label>
                        <input type="text" class="form-control" name="in_time" 
                               value="{{ visitor.in_time }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status" required>
                            <option value="Inside" {% if visitor.status == 'Inside' %}selected{% endif %}>Inside</option>
                            <option value="Left" {% if visitor.status == 'Left' %}selected{% endif %}>Left</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('records') }}" class="btn btn-secondary me-md-2">
                            <i class="fa fa-times"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa fa-save"></i> Update Visitor
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
